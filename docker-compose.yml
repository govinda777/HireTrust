version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: hiretrust-db
    environment:
      POSTGRES_DB: hiretrust
      POSTGRES_USER: local_user
      POSTGRES_PASSWORD: local_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: hiretrust-event-bus
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # UI
    environment:
      RABBITMQ_DEFAULT_USER: local_user
      RABBITMQ_DEFAULT_PASS: local_password

  hardhat:
    image: node:18-alpine
    container_name: hiretrust-hardhat
    working_dir: /app
    volumes:
      - ./packages/blockchain:/app
    command: sh -c "npm install && npx hardhat node"
    ports:
      - "8545:8545"

volumes:
  pgdata:
